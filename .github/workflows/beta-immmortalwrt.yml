name: Build ImmortalWrt-x86-64 Beta

on:
  workflow_dispatch:
    inputs:
      profile:
        description: '请输入要编译固件大小 单位(MB)'
        required: true
        default: '1024'
      include_docker:
        description: |
          是否编译 Docker 插件
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'
      enable_pppoe:
        description: "是否配置PPPoE拨号信息?"
        required: true
        default: 'no'
        type: choice
        options:
        - 'yes'
        - 'no'
      pppoe_account:
        description: "宽带账号 (若启用PPPoE)"
        required: false
      pppoe_password:
        description: "宽带密码 (若启用PPPoE)"
        required: false

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev zlib1g-dev gawk gettext unzip file libssl-dev wget git python3

      - name: Set Environment Variables
        run: |
          echo "PROFILE=generic" >> $GITHUB_ENV
          echo "profile=${{ github.event.inputs.profile }}" >> $GITHUB_ENV
          echo "include_docker=${{ github.event.inputs.include_docker }}" >> $GITHUB_ENV
          echo "enable_pppoe=${{ github.event.inputs.enable_pppoe }}" >> $GITHUB_ENV
          echo "pppoe_account=${{ github.event.inputs.pppoe_account }}" >> $GITHUB_ENV
          echo "pppoe_password=${{ github.event.inputs.pppoe_password }}" >> $GITHUB_ENV

      - name: Download OpenWrt ImageBuilder
        run: |
          IMAGEBUILDER_URL="https://downloads.openwrt.org/releases/22.03.5/targets/x86/64/openwrt-imagebuilder-22.03.5-x86-64.Linux-x86_64.tar.xz"
          wget -q $IMAGEBUILDER_URL -O imagebuilder.tar.xz
          mkdir -p imagebuilder
          tar -xf imagebuilder.tar.xz -C imagebuilder --strip-components=1
          rm imagebuilder.tar.xz

      - name: Validate PPPoE Inputs
        run: |
          if [[ "${{ github.event.inputs.enable_pppoe }}" == "yes" ]]; then
            if [[ -z "${{ github.event.inputs.pppoe_account }}" || -z "${{ github.event.inputs.pppoe_password }}" ]]; then
              echo "Error: PPPoE account and password must be provided when PPPoE is enabled!"
              exit 1
            fi
          fi

      - name: Build ImmortalWrt-x86-64
        run: |
          cd imagebuilder
          PACKAGES="luci-app-opkg luci-app-firewall luci-mod-admin-full luci-theme-bootstrap"
          PACKAGES="$PACKAGES luci-proto-ipv6 luci-proto-ppp luci-app-diskman luci-app-attendedsysupgrade"
          PACKAGES="$PACKAGES openssh-sftp-server -dnsmasq dnsmasq-full -wpad-basic -wpadmini wpad-openssl"
          
          if [[ "${{ github.event.inputs.include_docker }}" == "yes" ]]; then
            PACKAGES="$PACKAGES luci-app-dockerman"
          fi

          make image PROFILE="generic" PACKAGES="$PACKAGES" FILES="${{ github.workspace }}/files" ROOTFS_PARTSIZE=$profile

          if [ $? -ne 0 ]; then
            echo "Error: Build failed!"
            exit 1
          fi

      - name: Generate Firmware SHA-256
        run: |
          OUTPUT=$(find $GITHUB_WORKSPACE/imagebuilder/bin/targets/x86/64/ -name "*squashfs-combined-efi.img.gz" | head -n 1)
          if [ -z "$OUTPUT" ]; then
            echo "Error: No firmware file found!"
            exit 1
          fi
          cp "$OUTPUT" $GITHUB_WORKSPACE/immortalwrt-x86-64-squashfs-combined-efi.img.gz
          sha256sum "$GITHUB_WORKSPACE/immortalwrt-x86-64-squashfs-combined-efi.img.gz" > $GITHUB_WORKSPACE/immortalwrt-x86-64-squashfs-combined-efi.img.gz.sha256
          sha256sum -c $GITHUB_WORKSPACE/immortalwrt-x86-64-squashfs-combined-efi.img.gz.sha256

      - name: Upload Firmware to Release
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: Autobuild-x86-64
          body_path: $GITHUB_WORKSPACE/info.md
          files: |
            $GITHUB_WORKSPACE/immortalwrt-x86-64-squashfs-combined-efi.img.gz
            $GITHUB_WORKSPACE/immortalwrt-x86-64-squashfs-combined-efi.img.gz.sha256
          token: ${{ secrets.GITHUB_TOKEN }}