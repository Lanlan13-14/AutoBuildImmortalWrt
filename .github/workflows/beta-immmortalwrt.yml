name: Build ImmortalWrt-x86-64 Beta

on:
  workflow_dispatch:
    inputs:
      profile:
        description: '请输入要编译固件大小 单位(MB)'
        required: true
        default: '1024'
      include_docker:
        description: '是否编译 Docker 插件'
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'
      enable_pppoe:
        description: "是否配置PPPoE拨号信息?"
        required: true
        default: 'no'
        type: choice
        options:
          - 'yes'
          - 'no'
      pppoe_account:
        description: "宽带账号 (若启用PPPoE)"
        required: false
      pppoe_password:
        description: "宽带密码 (若启用PPPoE)"
        required: false

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # 1. 检出代码
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. 安装构建所需的依赖
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev zlib1g-dev gawk gettext unzip file libssl-dev wget git python3

      # 3. 下载并解压 OpenWrt ImageBuilder
      - name: Download OpenWrt ImageBuilder
        run: |
          IMAGEBUILDER_URL="https://downloads.openwrt.org/releases/22.03.5/targets/x86/64/openwrt-imagebuilder-22.03.5-x86-64.Linux-x86_64.tar.xz"
          wget -q $IMAGEBUILDER_URL -O imagebuilder.tar.xz
          mkdir -p imagebuilder
          tar -xf imagebuilder.tar.xz -C imagebuilder --strip-components=1
          rm imagebuilder.tar.xz

      # 4. 设置环境变量
      - name: Set Environment Variables
        run: |
          echo "enable_pppoe=${{ github.event.inputs.enable_pppoe }}" >> $GITHUB_ENV
          echo "profile=${{ github.event.inputs.profile }}" >> $GITHUB_ENV
          echo "include_docker=${{ github.event.inputs.include_docker }}" >> $GITHUB_ENV
          echo "pppoe_account=${{ github.event.inputs.pppoe_account }}" >> $GITHUB_ENV
          echo "pppoe_password=${{ github.event.inputs.pppoe_password }}" >> $GITHUB_ENV

      # 5. 验证 PPPoE 输入是否正确
      - name: Validate PPPoE Inputs
        run: |
          if [ "$enable_pppoe" = "yes" ] && { [ -z "$pppoe_account" ] || [ -z "$pppoe_password" ]; }; then
            echo "Error: PPPoE account and password must be provided when PPPoE is enabled!"
            exit 1
          fi

      # 6. 创建 PPPoE 配置文件
      - name: Create PPPoE Config File
        run: |
          mkdir -p $GITHUB_WORKSPACE/files/etc/config
          cat << EOF > $GITHUB_WORKSPACE/files/etc/config/pppoe-settings
          enable_pppoe=$enable_pppoe
          pppoe_account=$pppoe_account
          pppoe_password=$pppoe_password
          EOF

      # 7. 下载额外的 IPK 软件包
      - name: Download IPK Packages
        run: |
          mkdir -p $GITHUB_WORKSPACE/files/packages
          cd $GITHUB_WORKSPACE/files/packages
          wget -q https://github.com/sirpdboy/luci-theme-kucat/releases/download/v2.5.4/luci-app-advancedplus_1.8.2_all.ipk
          wget -q https://github.com/sirpdboy/luci-theme-kucat/releases/download/v2.5.4/luci-i18n-advancedplus-zh-cn_git-25.052.66486-a996405_all.ipk
          wget -q https://github.com/sirpdboy/luci-theme-kucat/releases/download/v2.5.4/luci-theme-kucat_2.5.4_all.ipk

      # 8. 添加 iStore 源
      - name: Add iStore Feed
        run: |
          echo 'src-git istore https://github.com/linkease/istore;main' >> imagebuilder/feeds.conf.default
          cd imagebuilder
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 9. 设置默认主题为 Argon
      - name: Set Default Theme to Argon
        run: |
          mkdir -p $GITHUB_WORKSPACE/files/etc/config
          cat << EOF > $GITHUB_WORKSPACE/files/etc/config/luci
          config core 'main'
              option mediaurlbase '/luci-static/argon'
          EOF

      # 10. 编译 ImmortalWrt 固件
      - name: Build ImmortalWrt-x86-64
        run: |
          cd imagebuilder
          PACKAGES="curl luci-i18n-diskman-zh-cn luci-i18n-firewall-zh-cn"
          PACKAGES="$PACKAGES luci-i18n-filebrowser-zh-cn luci-app-argon-config"
          PACKAGES="$PACKAGES luci-i18n-argon-config-zh-cn luci-i18n-package-manager-zh-cn"
          PACKAGES="$PACKAGES luci-i18n-ttyd-zh-cn luci-i18n-passwall-zh-cn"
          PACKAGES="$PACKAGES luci-app-openclash luci-i18n-homeproxy-zh-cn"
          PACKAGES="$PACKAGES openssh-sftp-server luci-i18n-ddns-go-zh-cn"
          PACKAGES="$PACKAGES luci-proto-wireguard qrencode kmod-tcp-bbr"
          PACKAGES="$PACKAGES luci-i18n-upnp-zh-cn fdisk script-utils"
          PACKAGES="$PACKAGES luci-i18n-samba4-zh-cn luci-app-store"
          PACKAGES="$PACKAGES luci-app-advancedplus luci-theme-kucat"

          if [ "$include_docker" = "yes" ]; then
            PACKAGES="$PACKAGES luci-i18n-dockerman-zh-cn"
          fi

          make image PROFILE="x86-64" PACKAGES="$PACKAGES" FILES="$GITHUB_WORKSPACE/files" ROOTFS_PARTSIZE=$profile

          if [ $? -ne 0 ]; then
            echo "Error: Build failed!"
            exit 1
          fi

      # 11. 计算固件的 SHA-256 哈希值
      - name: Generate Firmware SHA-256
        run: |
          OUTPUT=$(find $GITHUB_WORKSPACE/imagebuilder/bin/targets/x86/64/ -name "*squashfs-combined-efi.img.gz" | head -n 1)
          if [ -z "$OUTPUT" ]; then
            echo "Error: No firmware file found!"
            exit 1
          fi
          cp "$OUTPUT" $GITHUB_WORKSPACE/immortalwrt-x86-64-squashfs-combined-efi.img.gz
          sha256sum "$GITHUB_WORKSPACE/immortalwrt-x86-64-squashfs-combined-efi.img.gz" > $GITHUB_WORKSPACE/immortalwrt-x86-64-squashfs-combined-efi.img.gz.sha256
          sha256sum -c $GITHUB_WORKSPACE/immortalwrt-x86-64-squashfs-combined-efi.img.gz.sha256

      # 12. 上传固件作为 GitHub Release 资产
      - name: Upload Firmware to Release
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: Autobuild-x86-64
          body_path: $GITHUB_WORKSPACE/info.md
          files: |
            $GITHUB_WORKSPACE/immortalwrt-x86-64-squashfs-combined-efi.img.gz
            $GITHUB_WORKSPACE/immortalwrt-x86-64-squashfs-combined-efi.img.gz.sha256
          token: ${{ secrets.GITHUB_TOKEN }}