#
# ImmortalWrt Builder
#
# 说明: 使用 ImmortalWrt ImageBuilder 构建固件，支持 PPPoE 配置、额外 IPK 包下载等操作
#

name: ImmortalWrt Builder

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      profile:
        description: '请输入要编译固件大小 单位(MB)'
        required: true
        default: '1024'
      include_docker:
        description: '是否编译 Docker 插件'
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'
      enable_pppoe:
        description: "是否配置 PPPoE 拨号信息?"
        required: true
        default: 'no'
        type: choice
        options:
          - 'yes'
          - 'no'
      pppoe_account:
        description: "宽带账号（若启用 PPPoE）"
        required: false
      pppoe_password:
        description: "宽带密码（若启用 PPPoE）"
        required: false

env:
  TZ: Asia/Shanghai
  IMAGEBUILDER_URL: "https://downloads.immortalwrt.org/releases/24.10.0/targets/x86/64/immortalwrt-imagebuilder-24.10.0-x86-64.Linux-x86_64.tar.zst"
  UPLOAD_ARTIFACT: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set Timezone
        run: sudo timedatectl set-timezone "$TZ"

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev zlib1g-dev gawk gettext unzip file libssl-dev wget git python3

      - name: Download ImmortalWrt ImageBuilder
        run: |
          wget -q $IMAGEBUILDER_URL -O imagebuilder.tar.zst
          mkdir -p imagebuilder
          tar --use-compress-program=unzstd -xf imagebuilder.tar.zst -C imagebuilder --strip-components=1
          rm imagebuilder.tar.zst

      - name: Check Available Profiles
        run: |
          cd imagebuilder
          AVAILABLE_PROFILES=$(make info | grep -E '^Profile' | awk '{print $2}')
          echo "Available Profiles: $AVAILABLE_PROFILES"
          if echo "$AVAILABLE_PROFILES" | grep -q "^generic$"; then
            echo "Using Profile: generic"
            echo "profile_name=generic" >> $GITHUB_ENV
          elif echo "$AVAILABLE_PROFILES" | grep -q "^legacy$"; then
            echo "Using Profile: legacy"
            echo "profile_name=legacy" >> $GITHUB_ENV
          else
            echo "Error: No suitable profile found for x86-64!"
            exit 1
          fi

      - name: Set Build Environment Variables
        run: |
          echo "enable_pppoe=${{ github.event.inputs.enable_pppoe }}" >> $GITHUB_ENV
          echo "profile_input=${{ github.event.inputs.profile }}" >> $GITHUB_ENV
          echo "include_docker=${{ github.event.inputs.include_docker }}" >> $GITHUB_ENV
          echo "pppoe_account=${{ github.event.inputs.pppoe_account }}" >> $GITHUB_ENV
          echo "pppoe_password=${{ github.event.inputs.pppoe_password }}" >> $GITHUB_ENV

      - name: Validate PPPoE Inputs
        run: |
          if [ "$enable_pppoe" = "yes" ] && { [ -z "$pppoe_account" ] || [ -z "$pppoe_password" ]; }; then
            echo "Error: PPPoE account and password must be provided when PPPoE is enabled!"
            exit 1
          fi

      - name: Create PPPoE Config File
        if: ${{ github.event.inputs.enable_pppoe == 'yes' }}
        run: |
          mkdir -p $GITHUB_WORKSPACE/files/etc/config
          cat << 'EOF' > $GITHUB_WORKSPACE/files/etc/config/network
config interface 'wan'
    option ifname 'eth0'
    option proto 'pppoe'
    option username '${{ github.event.inputs.pppoe_account }}'
    option password '${{ github.event.inputs.pppoe_password }}'
EOF

      - name: Download Additional IPK Packages
        run: |
          mkdir -p $GITHUB_WORKSPACE/files/packages
          cd $GITHUB_WORKSPACE/files/packages
          wget -q https://github.com/sirpdboy/luci-theme-kucat/releases/download/v2.5.4/luci-app-advancedplus_1.8.2_all.ipk
          wget -q https://github.com/sirpdboy/luci-theme-kucat/releases/download/v2.5.4/luci-i18n-advancedplus-zh-cn_git-25.052.66486-a996405_all.ipk
          wget -q https://github.com/sirpdboy/luci-theme-kucat/releases/download/v2.5.4/luci-theme-kucat_2.5.4_all.ipk

      - name: Build ImmortalWrt Firmware
        run: |
          cd imagebuilder
          # 定义需要编译的包列表，可根据需要修改
          PACKAGES="curl luci-i18n-diskman-zh-cn luci-i18n-firewall-zh-cn luci-i18n-filebrowser-zh-cn luci-app-argon-config luci-i18n-argon-config-zh-cn luci-i18n-package-manager-zh-cn"
          echo "Starting build with packages: $PACKAGES"
          make image PROFILE=$profile_name PACKAGES="$PACKAGES"

      - name: Upload Firmware Artifact
        if: env.UPLOAD_ARTIFACT == 'true'
        uses: actions/upload-artifact@v3
        with:
          name: ImmortalWrt_Firmware_${{ github.run_id }}
          path: imagebuilder/bin