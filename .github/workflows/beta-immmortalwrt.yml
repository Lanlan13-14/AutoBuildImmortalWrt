name: Build ImmortalWrt Firmware

on:
  workflow_dispatch:
    inputs:
      profile:
        description: '请输入要编译固件大小 单位(MB)'
        required: true
        default: '1024'
      include_docker:
        description: '是否编译 Docker 插件'
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'
      enable_pppoe:
        description: "是否配置 PPPoE 拨号信息?"
        required: true
        default: 'no'
        type: choice
        options:
          - 'yes'
          - 'no'
      pppoe_account:
        description: "宽带账号（若启用 PPPoE）"
        required: false
      pppoe_password:
        description: "宽带密码（若启用 PPPoE）"
        required: false

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Required Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev zlib1g-dev gawk gettext unzip file libssl-dev wget git python3 zstd

      - name: Download ImmortalWrt ImageBuilder
        run: |
          IMAGEBUILDER_URL="https://downloads.immortalwrt.org/releases/24.10.0/targets/x86/64/immortalwrt-imagebuilder-24.10.0-x86-64.Linux-x86_64.tar.zst"
          wget -q $IMAGEBUILDER_URL -O imagebuilder.tar.zst
          mkdir -p imagebuilder
          tar --use-compress-program=unzstd -xf imagebuilder.tar.zst -C imagebuilder --strip-components=1
          rm imagebuilder.tar.zst

      - name: Check Available Profiles
        run: |
          cd imagebuilder
          AVAILABLE_PROFILES=$(make info | grep -E '^Profile' | awk '{print $2}')
          echo "Available Profiles: $AVAILABLE_PROFILES"
          if echo "$AVAILABLE_PROFILES" | grep -q "^generic$"; then
            echo "profile_name=generic" >> $GITHUB_ENV
          elif echo "$AVAILABLE_PROFILES" | grep -q "^legacy$"; then
            echo "profile_name=legacy" >> $GITHUB_ENV
          else
            echo "Error: No suitable Profile found for x86-64!"
            exit 1
          fi

      - name: Set Environment Variables
        run: |
          echo "enable_pppoe=${{ github.event.inputs.enable_pppoe }}" >> $GITHUB_ENV
          echo "profile=${{ github.event.inputs.profile }}" >> $GITHUB_ENV
          echo "include_docker=${{ github.event.inputs.include_docker }}" >> $GITHUB_ENV
          echo "pppoe_account=${{ github.event.inputs.pppoe_account }}" >> $GITHUB_ENV
          echo "pppoe_password=${{ github.event.inputs.pppoe_password }}" >> $GITHUB_ENV

      - name: Validate PPPoE Inputs
        run: |
          if [ "$enable_pppoe" = "yes" ] && { [ -z "$pppoe_account" ] || [ -z "$pppoe_password" ]; }; then
            echo "Error: PPPoE account and password must be provided when PPPoE is enabled!"
            exit 1
          fi

      - name: Create PPPoE Config File
        if: ${{ github.event.inputs.enable_pppoe == 'yes' }}
        run: |
          mkdir -p $GITHUB_WORKSPACE/files/etc/config
          cat << EOF > $GITHUB_WORKSPACE/files/etc/config/network
          config interface 'wan'
              option ifname 'eth0'
              option proto 'pppoe'
              option username '$pppoe_account'
              option password '$pppoe_password'
          EOF

      - name: Add Custom Feeds (nikki, kucat, istore)
        run: |
          echo "src-git nikki https://github.com/nikkinikki-org/OpenWrt-nikki.git;main" >> imagebuilder/feeds.conf.default
          echo "src-git kucat https://github.com/kucat/luci-app-kucat.git;main" >> imagebuilder/feeds.conf.default
          echo "src-git istore https://github.com/linkease/istore.git;main" >> imagebuilder/feeds.conf.default
          cd imagebuilder
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Set Default Theme to Argon
        run: |
          mkdir -p $GITHUB_WORKSPACE/files/etc/config
          cat << EOF > $GITHUB_WORKSPACE/files/etc/config/luci
          config core 'main'
              option mediaurlbase '/luci-static/argon'
          EOF

      - name: Build ImmortalWrt-x86-64
        run: |
          cd imagebuilder
          PACKAGES="curl luci-i18n-diskman-zh-cn luci-i18n-firewall-zh-cn"
          PACKAGES="$PACKAGES luci-i18n-filebrowser-zh-cn luci-app-argon-config"
          PACKAGES="$PACKAGES luci-i18n-argon-config-zh-cn luci-i18n-package-manager-zh-cn"
          PACKAGES="$PACKAGES luci-app-nikki luci-app-kucat luci-app-store"
          [ "$include_docker" = "yes" ] && PACKAGES="$PACKAGES luci-app-docker"
          make image PROFILE=$profile_name PACKAGES="$PACKAGES"

      - name: Upload Firmware
        uses: actions/upload-artifact@v3
        with:
          name: ImmortalWrt-Firmware
          path: imagebuilder/bin/targets/x86/64/*.img.gz