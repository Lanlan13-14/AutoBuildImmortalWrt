name: Build ImmortalWrt Firmware

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Enter the firmware size in MB'
        required: true
        default: '1024'
      include_docker:
        description: 'Include Docker plugin?'
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'
      enable_pppoe:
        description: "Configure PPPoE?"
        required: true
        default: 'no'
        type: choice
        options:
          - 'yes'
          - 'no'
      pppoe_account:
        description: "PPPoE Account (if enabled)"
        required: false
      pppoe_password:
        description: "PPPoE Password (if enabled)"
        required: false

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev zlib1g-dev gawk gettext unzip file libssl-dev wget git python3

      - name: Download ImmortalWrt ImageBuilder
        run: |
          IMAGEBUILDER_URL="https://downloads.immortalwrt.org/releases/22.03.5/targets/x86/64/immortalwrt-imagebuilder-22.03.5-x86-64.Linux-x86_64.tar.xz"
          wget -q $IMAGEBUILDER_URL -O imagebuilder.tar.xz
          mkdir -p imagebuilder
          tar -xf imagebuilder.tar.xz -C imagebuilder --strip-components=1
          rm imagebuilder.tar.xz

      - name: Set Environment Variables
        run: |
          echo "enable_pppoe=${{ github.event.inputs.enable_pppoe }}" >> $GITHUB_ENV
          echo "profile=${{ github.event.inputs.profile }}" >> $GITHUB_ENV
          echo "include_docker=${{ github.event.inputs.include_docker }}" >> $GITHUB_ENV
          echo "pppoe_account=${{ github.event.inputs.pppoe_account }}" >> $GITHUB_ENV
          echo "pppoe_password=${{ github.event.inputs.pppoe_password }}" >> $GITHUB_ENV

      - name: Validate PPPoE Inputs
        run: |
          if [ "$enable_pppoe" = "yes" ] && { [ -z "$pppoe_account" ] || [ -z "$pppoe_password" ]; }; then
            echo "Error: PPPoE account and password must be provided when PPPoE is enabled!"
            exit 1
          fi

      - name: Create PPPoE Config File
        run: |
          mkdir -p $GITHUB_WORKSPACE/files/etc/config
          cat << EOF > $GITHUB_WORKSPACE/files/etc/config/pppoe-settings
          enable_pppoe=$enable_pppoe
          pppoe_account=$pppoe_account
          pppoe_password=$pppoe_password
          EOF

      - name: Download Additional IPK Packages
        run: |
          mkdir -p $GITHUB_WORKSPACE/files/packages
          cd $GITHUB_WORKSPACE/files/packages
          wget -q https://github.com/sirpdboy/luci-theme-kucat/releases/download/v2.5.4/luci-app-advancedplus_1.8.2_all.ipk
          wget -q https://github.com/sirpdboy/luci-theme-kucat/releases/download/v2.5.4/luci-i18n-advancedplus-zh-cn_git-25.052.66486-a996405_all.ipk
          wget -q https://github.com/sirpdboy/luci-theme-kucat/releases/download/v2.5.4/luci-theme-kucat_2.5.4_all.ipk

      - name: Add Feeds and Update
        run: |
          echo 'src-git istore https://github.com/linkease/istore;main' >> imagebuilder/feeds.conf.default
          echo 'src-git nikki https://github.com/nikkinikki-org/OpenWrt-nikki.git;main' >> imagebuilder/feeds.conf.default
          cd imagebuilder
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Set Default Theme to Argon
        run: |
          mkdir -p $GITHUB_WORKSPACE/files/etc/config
          cat << EOF > $GITHUB_WORKSPACE/files/etc/config/luci
          config core 'main'
              option mediaurlbase '/luci-static/argon'
          EOF

      - name: Build ImmortalWrt Firmware
        run: |
          cd imagebuilder
          PACKAGES="curl luci-i18n-diskman-zh-cn luci-i18n-firewall-zh-cn"
          PACKAGES="$PACKAGES luci-i18n-filebrowser-zh-cn luci-app-argon-config"
          PACKAGES="$PACKAGES luci-i18n-argon-config-zh-cn luci-i18n-package-manager-zh-cn"
          PACKAGES="$PACKAGES luci-i18n-ttyd-zh-cn luci-i18n-passwall-zh-cn"
          PACKAGES18